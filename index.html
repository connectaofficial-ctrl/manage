<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>connec+a Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --ai:#1a2744;--ai-mid:#2a4a7f;--ai-soft:#4a6fa5;--ai-pale:#d4e4f7;
      --shiro:#f8f9fc;--shiro-2:#eef2f8;--border:rgba(42,74,127,.15);
      --haru:#f4b8cb;--natsu:#7b5ea7;--aki:#d4511a;--fuyu:#b8d4f0;--matcha:#4e7252;
      --shadow:0 2px 16px rgba(26,39,68,.08);--shadow-md:0 8px 32px rgba(26,39,68,.14);
      --r:14px;--rs:10px;
    }
    html,body{height:100%;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--shiro);color:var(--ai);min-height:100vh;}

    /* ログイン */
    .login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background:var(--ai);position:relative;overflow:hidden;}
    .login-wrap::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 20% 30%,rgba(244,184,203,.1) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 70%,rgba(123,94,167,.1) 0%,transparent 60%);}
    .login-wrap::after{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 4 L56 30 L30 56 L4 30 Z' fill='none' stroke='rgba(255,255,255,.03)' stroke-width='1'/%3E%3C/svg%3E");}
    .login-card{background:rgba(255,255,255,.05);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.1);border-radius:var(--r);padding:48px 40px;width:100%;max-width:380px;text-align:center;position:relative;z-index:1;}
    .login-logo{width:52px;height:52px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:.85rem;color:rgba(255,255,255,.85);font-weight:900;margin:0 auto 14px;}
    .login-bar{height:2px;border-radius:99px;background:linear-gradient(90deg,var(--haru),var(--natsu),var(--aki),var(--fuyu));margin-bottom:18px;}
    .login-title{font-family:'Zen Old Mincho',serif;font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:4px;letter-spacing:.08em;}
    .login-sub{color:rgba(255,255,255,.35);font-size:.7rem;letter-spacing:.18em;margin-bottom:26px;text-transform:uppercase;}
    .login-input{width:100%;padding:12px 16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:var(--rs);color:#fff;font-size:.9rem;outline:none;font-family:'Noto Sans JP',sans-serif;margin-bottom:10px;transition:border-color .2s;}
    .login-input:focus{border-color:var(--ai-pale);}
    .login-input::placeholder{color:rgba(255,255,255,.28);}
    .login-btn{width:100%;padding:13px;border-radius:99px;border:none;background:#fff;color:var(--ai);font-weight:800;font-size:.92rem;cursor:pointer;transition:all .25s;font-family:'Noto Sans JP',sans-serif;letter-spacing:.04em;}
    .login-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,255,255,.18);}
    .login-error{color:#f4916a;font-size:.78rem;margin-top:10px;min-height:18px;}

    /* ヘッダー */
    .season-bar{height:2px;background:linear-gradient(90deg,var(--haru),var(--natsu),var(--aki),var(--fuyu));}
    .header{background:var(--ai);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:100;}
    .header__brand{display:flex;align-items:center;gap:10px;}
    .header__logo{width:30px;height:30px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:.6rem;color:rgba(255,255,255,.8);font-weight:900;}
    .header__title{font-family:'Zen Old Mincho',serif;font-size:.95rem;color:#fff;letter-spacing:.08em;}
    .header__right{display:flex;align-items:center;gap:8px;}
    .lang-sel{padding:5px 10px;border-radius:99px;font-size:.72rem;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);cursor:pointer;outline:none;font-family:'Noto Sans JP',sans-serif;}
    .lang-sel option{background:#1a2744;color:#fff;}
    .header__logout{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:6px 14px;border-radius:99px;cursor:pointer;font-size:.78rem;font-family:'Noto Sans JP',sans-serif;transition:all .2s;}
    .header__logout:hover{background:rgba(255,255,255,.15);color:#fff;}

    /* レイアウト */
    .layout{display:grid;grid-template-columns:200px 1fr;min-height:calc(100vh - 58px);}
    .sidebar{background:#fdfaf5;border-right:1px solid var(--border);padding:16px 0;}
    .sidebar-section{padding:16px 18px 6px;font-size:.65rem;color:var(--ai-soft);letter-spacing:.22em;font-weight:600;}
    .sidebar-item{display:block;padding:11px 18px;font-size:.875rem;color:var(--ai-soft);cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .sidebar-item:hover{color:var(--ai);background:rgba(42,74,127,.04);}
    .sidebar-item.active{color:var(--ai);border-left-color:var(--ai-mid);background:rgba(42,74,127,.05);font-weight:600;}
    .content{padding:28px;overflow:auto;}
    .section-title{font-family:'Zen Old Mincho',serif;font-size:1.05rem;font-weight:700;color:var(--ai);margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--shiro-2);}

    /* 統計カード */
    .stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-bottom:24px;}
    .stat-card{background:#fff;border-radius:var(--rs);border:1px solid var(--border);padding:18px 14px;text-align:center;box-shadow:var(--shadow);transition:all .2s;position:relative;overflow:hidden;}
    .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;}
    .stat-card:nth-child(1)::before{background:linear-gradient(90deg,var(--haru),#d080a0);}
    .stat-card:nth-child(2)::before{background:linear-gradient(90deg,var(--natsu),#5a3a8a);}
    .stat-card:nth-child(3)::before{background:linear-gradient(90deg,var(--aki),#a03010);}
    .stat-card:nth-child(4)::before{background:linear-gradient(90deg,#4a6fa5,var(--fuyu));}
    .stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
    .stat-num{font-size:2rem;font-weight:800;color:var(--ai);line-height:1.1;}
    .stat-label{font-size:.72rem;color:var(--ai-soft);margin-top:5px;}

    /* テーブル */
    .table-wrap{overflow-x:auto;}
    table{width:100%;border-collapse:collapse;font-size:.82rem;}
    th{padding:9px 14px;text-align:left;color:var(--ai-soft);font-weight:600;border-bottom:2px solid var(--shiro-2);white-space:nowrap;}
    td{padding:10px 14px;border-bottom:1px solid var(--shiro-2);color:var(--ai);}
    tr:hover>td{background:rgba(42,74,127,.02);}

    /* バッジ */
    .badge{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.7rem;font-weight:700;}
    .badge-free{background:rgba(78,114,82,.1);color:var(--matcha);}
    .badge-unpaid{background:rgba(212,81,26,.1);color:var(--aki);}
    .badge-paypay_pending{background:rgba(123,94,167,.1);color:var(--natsu);}
    .badge-paypay_paid{background:rgba(78,114,82,.1);color:var(--matcha);}
    .badge-cash{background:rgba(42,74,127,.1);color:var(--ai-mid);}
    .badge-open{background:rgba(78,114,82,.1);color:var(--matcha);}
    .badge-closed{background:var(--shiro-2);color:var(--ai-soft);}
    .badge-checked{background:rgba(78,114,82,.1);color:var(--matcha);}
    .badge-not-checked{background:var(--shiro-2);color:var(--ai-soft);}

    /* ボタン */
    .btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border-radius:99px;font-size:.82rem;font-weight:700;cursor:pointer;border:none;transition:all .25s;font-family:'Noto Sans JP',sans-serif;}
    .btn-ai{background:var(--ai);color:#fff;box-shadow:0 3px 10px rgba(26,39,68,.18);}
    .btn-ai:hover{background:var(--ai-mid);transform:translateY(-1px);}
    .btn-matcha{background:var(--matcha);color:#fff;}
    .btn-sakura{background:var(--haru);color:#fff;}
    .btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--ai-soft);}
    .btn-outline:hover{border-color:var(--ai-mid);color:var(--ai-mid);}
    .btn-sm{padding:5px 12px;font-size:.75rem;}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}

    /* フォーム */
    .form-group{margin-bottom:14px;}
    .form-label{display:block;font-size:.78rem;font-weight:600;color:var(--ai-soft);margin-bottom:6px;letter-spacing:.04em;}
    .form-control{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.875rem;color:var(--ai);background:#fff;outline:none;transition:all .2s;font-family:'Noto Sans JP',sans-serif;}
    .form-control:focus{border-color:var(--ai-mid);box-shadow:0 0 0 3px rgba(42,74,127,.08);}
    select.status-sel{padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:.75rem;color:var(--ai-mid);cursor:pointer;font-family:'Noto Sans JP',sans-serif;background:#fff;}

    /* アラート */
    .alert{padding:12px 16px;border-radius:var(--rs);font-size:.82rem;margin-bottom:12px;line-height:1.7;}
    .alert-success{background:rgba(78,114,82,.07);border-left:3px solid var(--matcha);color:var(--matcha);}
    .alert-danger{background:rgba(212,81,26,.07);border-left:3px solid var(--aki);color:#8a2010;}
    .alert-info{background:rgba(42,74,127,.07);border-left:3px solid var(--ai-soft);color:var(--ai-mid);}

    /* スピナー */
    .spinner{width:32px;height:32px;border:2px solid var(--shiro-2);border-top-color:var(--ai-mid);border-radius:50%;animation:spin .8s linear infinite;margin:28px auto;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* QR詳細パネル */
    .detail-panel{background:#fff;border-radius:var(--r);border:1.5px solid var(--ai-pale);padding:22px;display:none;box-shadow:var(--shadow);animation:slideIn .3s ease both;}
    .detail-panel.show{display:block;}
    @keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
    .detail-panel::before{content:'';display:block;height:3px;margin:-22px -22px 18px;background:linear-gradient(90deg,var(--haru),var(--natsu),var(--aki),var(--fuyu));border-radius:var(--r) var(--r) 0 0;}
    .detail-header{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--shiro-2);}
    .detail-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--ai-mid),var(--natsu));display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:1.3rem;color:#fff;flex-shrink:0;}
    .detail-name{font-size:1.1rem;font-weight:700;color:var(--ai);margin-bottom:2px;}
    .detail-rank{font-size:.75rem;color:var(--ai-soft);}
    .detail-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--shiro-2);}
    .detail-row:last-child{border-bottom:none;}
    .detail-key{font-size:.78rem;color:var(--ai-soft);}
    .detail-val{font-size:.85rem;font-weight:600;color:var(--ai);}
    .detail-actions{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}

    /* 参加履歴タイムライン */
    .history-timeline{margin-top:14px;}
    .history-item-tl{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--shiro-2);}
    .history-item-tl:last-child{border-bottom:none;}
    .tl-dot{width:8px;height:8px;border-radius:50%;background:var(--ai-mid);margin-top:4px;flex-shrink:0;}
    .tl-body{font-size:.82rem;}
    .tl-event{font-weight:600;color:var(--ai);}
    .tl-date{font-size:.72rem;color:var(--ai-soft);}

    /* ライブバッジ */
    .live-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(78,114,82,.08);border:1px solid rgba(78,114,82,.2);color:var(--matcha);border-radius:99px;padding:5px 14px;font-size:.72rem;font-weight:600;margin-bottom:14px;}
    .live-dot{width:6px;height:6px;border-radius:50%;background:var(--matcha);animation:lp 1.5s infinite;}
    @keyframes lp{0%,100%{opacity:1;}50%{opacity:.3;}}
    .waiting-box{text-align:center;padding:36px 20px;}
    .waiting-box p{color:var(--ai-soft);font-size:.875rem;line-height:1.8;}

    /* スキャンログ */
    .scan-log-table table{font-size:.78rem;}
    .log-action-CHECKIN{color:var(--matcha);font-weight:700;}
    .log-action-LOOKUP{color:var(--ai-soft);}
    .log-action-PAYMENT_ISSUE{color:var(--aki);font-weight:700;}

    /* 満足度グラフ */
    .survey-section{margin-top:20px;}
    .survey-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;}
    .survey-card{background:#fff;border-radius:var(--rs);border:1px solid var(--border);padding:16px;box-shadow:var(--shadow);}
    .survey-card h4{font-size:.85rem;font-weight:700;color:var(--ai);margin-bottom:12px;}
    .chart-wrap{position:relative;height:200px;}
    .avg-display{text-align:center;padding:12px 0;}
    .avg-num{font-size:3rem;font-weight:800;color:var(--ai);}
    .avg-stars{font-size:1.4rem;margin:4px 0;}
    .avg-label{font-size:.75rem;color:var(--ai-soft);}
    .star-filled{color:#f59e0b;}
    .star-empty{color:#e5e7eb;}
    .comment-list{max-height:200px;overflow-y:auto;}
    .comment-item{padding:8px 0;border-bottom:1px solid var(--shiro-2);font-size:.8rem;}
    .comment-item:last-child{border-bottom:none;}
    .comment-name{font-weight:600;color:var(--ai);}
    .comment-rating{color:#f59e0b;font-size:.85rem;}
    .comment-text{color:var(--ai-mid);margin-top:2px;line-height:1.5;}

    /* 満足度調査送信カード */
    .survey-send-card{background:linear-gradient(135deg,rgba(244,184,203,.1),rgba(42,74,127,.06));border:1px solid rgba(244,184,203,.3);border-radius:var(--rs);padding:16px;margin-bottom:16px;}
    .survey-send-card h4{font-size:.875rem;font-weight:700;color:var(--ai);margin-bottom:8px;}

    /* トースト */
    .toast{position:fixed;bottom:24px;right:24px;z-index:999;max-width:300px;}

    /* タブ */
    .tab-section{display:none;}
    .tab-section.active{display:block;animation:tabIn .3s ease both;}
    @keyframes tabIn{from{opacity:0;transform:translateX(6px);}to{opacity:1;transform:translateX(0);}}

    .search-bar{display:flex;gap:8px;margin-bottom:14px;}
    .search-bar input{flex:1;}

    /* モーダル */
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:16px;}
    .modal-overlay.open{display:flex;}
    .modal-box{background:#fff;border-radius:var(--r);max-width:520px;width:100%;padding:28px;box-shadow:0 20px 60px rgba(26,39,68,.2);max-height:90vh;overflow-y:auto;}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
    .modal-title{font-family:'Zen Old Mincho',serif;font-size:1rem;font-weight:700;color:var(--ai);}
    .modal-close{background:none;border:none;cursor:pointer;font-size:1.3rem;color:var(--ai-soft);}

    /* イベントカード */
    .event-card-list{display:grid;gap:12px;}
    .event-card-item{background:#fff;border-radius:var(--rs);border:1px solid var(--border);border-left:4px solid;padding:16px 18px;box-shadow:var(--shadow);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;}
    .event-card-item:nth-child(4n+1){border-left-color:var(--haru);}
    .event-card-item:nth-child(4n+2){border-left-color:var(--natsu);}
    .event-card-item:nth-child(4n+3){border-left-color:var(--aki);}
    .event-card-item:nth-child(4n){border-left-color:var(--fuyu);}
    .event-card-name{font-family:'Zen Old Mincho',serif;font-weight:700;color:var(--ai);margin-bottom:5px;}
    .event-card-meta{font-size:.78rem;color:var(--ai-soft);line-height:1.9;}
    .event-card-actions{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}

    @media(max-width:768px){
      .layout{grid-template-columns:1fr;}
      .sidebar{display:flex;overflow-x:auto;padding:8px 0;}
      .sidebar-item{white-space:nowrap;border-left:none;border-bottom:2px solid transparent;}
      .sidebar-item.active{border-bottom-color:var(--ai-mid);}
      .content{padding:16px;}
      .survey-grid{grid-template-columns:1fr;}
    }
  </style>
</head>
<body>

<!-- ログイン -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">c+a</div>
      <div class="login-bar"></div>
      <div class="login-title">connec+a</div>
      <div class="login-sub">Admin Panel</div>
      <input id="pw-input" class="login-input" type="password" placeholder="パスワードを入力">
      <button class="login-btn" onclick="doLogin()">ログイン</button>
      <div class="login-error" id="login-error"></div>
    </div>
  </div>
</div>

<!-- 管理画面 -->
<div id="admin-screen" style="display:none;">
  <div class="season-bar"></div>
  <header class="header">
    <div class="header__brand">
      <div class="header__logo">c+a</div>
      <span class="header__title">connec+a Admin</span>
    </div>
    <div class="header__right">
      <select class="lang-sel" id="lang-sel" onchange="setLang(this.value)">
        <option value="ja">日本語</option><option value="en">English</option><option value="zh">中文</option>
        <option value="ko">한국어</option><option value="es">Español</option><option value="fr">Français</option>
        <option value="pt">Português</option><option value="id">Indonesia</option><option value="th">ภาษาไทย</option>
        <option value="vi">Tiếng Việt</option><option value="ar">العربية</option><option value="hi">हिन्दी</option>
        <option value="de">Deutsch</option><option value="it">Italiano</option><option value="ru">Русский</option>
      </select>
      <button class="header__logout" onclick="doLogout()">ログアウト</button>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-section">Menu</div>
      <button class="sidebar-item active" onclick="switchTab('dashboard')">ダッシュボード</button>
      <button class="sidebar-item"        onclick="switchTab('events')">イベント管理</button>
      <button class="sidebar-item"        onclick="switchTab('qrscan')">QR照会</button>
      <button class="sidebar-item"        onclick="switchTab('registrations')">登録一覧</button>
      <button class="sidebar-item"        onclick="switchTab('participants')">参加者</button>
      <button class="sidebar-item"        onclick="switchTab('survey')">満足度調査</button>
    </aside>

    <main class="content">

      <!-- ダッシュボード -->
      <section id="tab-dashboard" class="tab-section active">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
          <div class="section-title" style="margin-bottom:0;border:none;">ダッシュボード</div>
          <div style="display:flex;align-items:center;gap:10px;">
            <span id="dash-last-updated" style="font-size:.72rem;color:var(--ai-soft);"></span>
            <button class="btn btn-outline btn-sm" onclick="loadDashboard()" id="dash-refresh-btn">更新</button>
            <label style="display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--ai-soft);cursor:pointer;">
              <input type="checkbox" id="dash-auto-refresh" onchange="toggleAutoRefresh(this.checked)"> 自動更新(30秒)
            </label>
          </div>
        </div>
        <div id="dashboard-area"><div class="spinner"></div></div>
      </section>

      <!-- イベント管理 -->
      <section id="tab-events" class="tab-section">
        <div class="section-title">イベント管理</div>
        <div style="display:flex;justify-content:flex-end;margin-bottom:16px;">
          <button class="btn btn-ai" onclick="openCreateModal()">新規作成</button>
        </div>
        <div id="events-area"><div class="spinner"></div></div>
      </section>

      <!-- QR照会 -->
      <section id="tab-qrscan" class="tab-section">
        <div class="section-title">QR照会</div>
        <p style="color:var(--ai-soft);font-size:.82rem;margin-bottom:16px;">QR受付画面でスキャンすると自動で情報が表示されます。照会内容はログに記録されます。</p>
        <div class="live-badge" id="live-badge" style="display:none;"><span class="live-dot"></span>リアルタイム受信中</div>

<div class="toast" id="toast"></div>

<script>
const GAS_URL  = 'https://script.google.com/macros/s/AKfycbw94iJOYloTfXOeOONgwyP3MlTXOBolUdSCFO57NyfYDr-0ISYMTLwntsQxinj5c8CsFA/exec';
const PASSWORD = 'admin1234'; // ★ ここを変更

// ============================================================
// ログイン（先頭に定義）
// ============================================================
function doLogin() {
  if (document.getElementById('pw-input').value === PASSWORD) {
    sessionStorage.setItem('admin_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    loadDashboard();
  } else {
    document.getElementById('login-error').textContent = 'パスワードが違います';
  }
}
function doLogout() { sessionStorage.removeItem('admin_auth'); location.reload(); }
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

if (sessionStorage.getItem('admin_auth') === '1') {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadDashboard();
}

// ============================================================
// API
// ============================================================
async function api(action, params) {
  params = params || {};
  const res = await fetch(GAS_URL, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(Object.assign({ action }, params)),
  });
  const json = await res.json();
  if (!json.success) throw new Error(json.error || 'Error');
  return json.data;
}
function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ============================================================
// ユーティリティ
// ============================================================
function payBadge(s) {
  const m = { FREE:'badge-free', UNPAID:'badge-unpaid', PAYPAY_PENDING:'badge-paypay_pending', PAYPAY_PAID:'badge-paypay_paid', CASH:'badge-cash' };
  const l = { FREE:'無料', UNPAID:'未払い', PAYPAY_PENDING:'PayPay確認待ち', PAYPAY_PAID:'PayPay支払済', CASH:'現金' };
  return '<span class="badge '+(m[s]||'')+'">'+esc(l[s]||s)+'</span>';
}
function checkinBadge(s) {
  return String(s) === 'TRUE'
    ? '<span class="badge badge-checked">入場済</span>'
    : '<span class="badge badge-not-checked">未入場</span>';
}
function starStr(rating) {
  const r = Math.round(rating);
  return '<span class="star-filled">'+'★'.repeat(r)+'</span><span class="star-empty">'+'★'.repeat(5-r)+'</span>';
}
function toastFn(type, msg) {
  const el = document.getElementById('toast');
  el.innerHTML = '<div class="alert alert-'+type+'">'+msg+'</div>';
  setTimeout(() => { el.innerHTML = ''; }, 3000);
}

// ============================================================
// タブ切り替え
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.tab-section').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelectorAll('.sidebar-item').forEach(el => {
    if (el.getAttribute('onclick') === "switchTab('"+tab+"')") el.classList.add('active');
  });
  const loaders = {
    dashboard:     loadDashboard,
    events:        loadEvents,
    qrscan:        () => { startPolling(); loadScanLogs(); },
    registrations: () => { loadEventFilterOptions(); loadRegistrations(); },
    participants:  () => searchParticipants(''),
    survey:        () => { loadSurveyEventOptions(); loadSurveyStats(); },
  };
  if (loaders[tab]) loaders[tab]();
  if (tab !== 'qrscan') stopPolling();
}

// ============================================================
// ダッシュボード（自動更新付き）
// ============================================================
let dashAutoRefreshTimer = null;

function toggleAutoRefresh(enabled) {
  if (dashAutoRefreshTimer) { clearInterval(dashAutoRefreshTimer); dashAutoRefreshTimer = null; }
  if (enabled) {
    dashAutoRefreshTimer = setInterval(() => {
      // ダッシュボードタブが表示中のときだけ更新
      if (document.getElementById('tab-dashboard').classList.contains('active')) {
        loadDashboard();
      }
    }, 30000);
  }
}
let chartInstances = {};

async function loadDashboard() {
  const area = document.getElementById('dashboard-area');
  area.innerHTML = '<div class="spinner"></div>';
  try {
    const stats = await api('getStats');

    let html =
      '<div class="stat-grid">' +
      '<div class="stat-card"><div class="stat-num">'+stats.openEvents+'</div><div class="stat-label">開催中</div></div>' +
      '<div class="stat-card"><div class="stat-num">'+stats.totalParticipants+'</div><div class="stat-label">参加者数</div></div>' +
      '<div class="stat-card"><div class="stat-num">'+stats.totalRegistrations+'</div><div class="stat-label">総登録数</div></div>' +
      '<div class="stat-card"><div class="stat-num">'+stats.totalEvents+'</div><div class="stat-label">総イベント数</div></div>' +
      '</div>' +
      '<div class="section-title" style="font-size:.9rem;margin-top:8px;">イベント別状況</div>' +
      '<div class="table-wrap"><table><thead><tr>' +
      '<th>イベント名</th><th>日時</th><th>定員</th><th>登録</th><th>入場済</th><th>満足度</th>' +
      '</tr></thead><tbody>';

    (stats.eventStats || []).forEach(ev => {
      const ratingStr = ev.avgRating
        ? starStr(ev.avgRating) + ' <span style="font-size:.75rem;color:var(--ai-soft);">'+ev.avgRating+' ('+ev.surveyCount+'件)</span>'
        : '<span style="color:var(--ai-soft);font-size:.75rem;">—</span>';
      html += '<tr>' +
        '<td><strong>'+esc(ev.EventName)+'</strong></td>' +
        '<td style="font-size:.78rem;">'+esc(ev.Date)+'</td>' +
        '<td>'+esc(ev.Capacity)+'</td>' +
        '<td>'+esc(ev.registrationCount)+'</td>' +
        '<td>'+esc(ev.checkinCount)+'</td>' +
        '<td>'+ratingStr+'</td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';

    // 満足度グラフセクション
    html += '<div class="section-title" style="font-size:.9rem;margin-top:24px;">満足度グラフ（全イベント）</div>' +
      '<div class="survey-grid">' +
        '<div class="survey-card"><h4>全体の評価分布</h4><div class="chart-wrap"><canvas id="chart-dist-all"></canvas></div></div>' +
        '<div class="survey-card"><h4>イベント別平均満足度</h4><div class="chart-wrap"><canvas id="chart-avg-events"></canvas></div></div>' +
      '</div>';

    area.innerHTML = html;

    // グラフ描画
    await drawDashboardCharts(stats.eventStats || []);

  } catch(err) { area.innerHTML = '<div class="alert alert-danger">'+esc(err.message)+'</div>'; }

  // 最終更新時刻を表示
  const updEl = document.getElementById('dash-last-updated');
  if (updEl) updEl.textContent = '最終更新: ' + new Date().toLocaleTimeString();
}

async function drawDashboardCharts(eventStats) {
  try {
    // 全体の評価分布
    const allSurveyStats = await api('getSurveyStats', {});
    if (allSurveyStats.count > 0) {
      const ctx1 = document.getElementById('chart-dist-all');
      if (ctx1) {
        if (chartInstances['dist-all']) chartInstances['dist-all'].destroy();
        chartInstances['dist-all'] = new Chart(ctx1, {
          type: 'bar',
          data: {
            labels: ['★1', '★2', '★3', '★4', '★5'],
            datasets: [{
              label: '回答数',
              data: allSurveyStats.distribution,
              backgroundColor: ['#f4b8cb','#7b5ea7','#d4511a','#b8d4f0','#1a2744'],
              borderRadius: 6,
            }]
          },
          options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } } } }
        });
      }
    }

    // イベント別平均
    const evWithRating = eventStats.filter(ev => ev.avgRating);
    if (evWithRating.length > 0) {
      const ctx2 = document.getElementById('chart-avg-events');
      if (ctx2) {
        if (chartInstances['avg-events']) chartInstances['avg-events'].destroy();
        chartInstances['avg-events'] = new Chart(ctx2, {
          type: 'bar',
          data: {
            labels: evWithRating.map(ev => ev.EventName.length > 10 ? ev.EventName.slice(0,10)+'…' : ev.EventName),
            datasets: [{
              label: '平均満足度',
              data: evWithRating.map(ev => ev.avgRating),
              backgroundColor: evWithRating.map((_,i) => ['rgba(244,184,203,.8)','rgba(123,94,167,.8)','rgba(212,81,26,.8)','rgba(26,39,68,.8)'][i%4]),
              borderRadius: 6,
            }]
          },
          options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ min:0, max:5, ticks:{ stepSize:1 } } } }
        });
      }
    }
  } catch(e) { console.warn('Chart error', e); }
}

// ============================================================
// イベント管理
// ============================================================
let editingEventId = null;

async function loadEvents() {
  const area = document.getElementById('events-area');
  area.innerHTML = '<div class="spinner"></div>';
  try {
    const stats  = await api('getStats');
    const events = stats.eventStats || [];
    if (!events.length) { area.innerHTML = '<div class="alert alert-info">イベントはまだありません。</div>'; return; }

    let html = '<div class="event-card-list">';
    events.forEach(ev => {
      html +=
        '<div class="event-card-item">' +
          '<div style="flex:1;min-width:200px;">' +
            '<div class="event-card-name">'+esc(ev.EventName)+'</div>' +
            '<div class="event-card-meta">'+esc(ev.Date)+'&emsp;'+esc(ev.Location)+'<br>' +
              (Number(ev.Price)===0?'無料':'¥'+Number(ev.Price).toLocaleString()) +
              '&emsp;登録: '+esc(ev.registrationCount)+' / '+esc(ev.Capacity)+'</div>' +
          '</div>' +
          '<div class="event-card-actions">' +
            (ev.Status==='OPEN'
              ? '<span class="badge badge-open">受付中</span>'
              : '<span class="badge badge-closed">終了</span>') +
            '<button class="btn btn-outline btn-sm" onclick=\'openEditModal('+JSON.stringify(ev)+')\'>編集</button>' +
            (ev.Status==='OPEN'
              ? '<button class="btn btn-sm" style="background:rgba(212,81,26,.1);color:var(--aki);border:none;" onclick="toggleEventStatus(\''+esc(ev.EventID)+'\',\'CLOSED\')">終了</button>'
              : '<button class="btn btn-sm" style="background:rgba(78,114,82,.1);color:var(--matcha);border:none;" onclick="toggleEventStatus(\''+esc(ev.EventID)+'\',\'OPEN\')">再開</button>'
            ) +
          '</div>' +
        '</div>';
    });
    html += '</div>';
    area.innerHTML = html;
  } catch(err) { area.innerHTML = '<div class="alert alert-danger">'+esc(err.message)+'</div>'; }
}

function openCreateModal() {
  editingEventId = null;
  document.getElementById('modal-title').textContent = 'イベント作成';
  document.getElementById('f-name').value = '';
  document.getElementById('f-date').value = '';
  document.getElementById('f-location').value = '';
  document.getElementById('f-price').value = '0';
  document.getElementById('f-capacity').value = '50';
  document.getElementById('f-paytype').value = 'FREE';
  document.getElementById('modal-status-row').style.display = 'none';
  document.getElementById('modal-alert').innerHTML = '';
  document.getElementById('event-modal').classList.add('open');
}
function openEditModal(ev) {
  editingEventId = ev.EventID;
  document.getElementById('modal-title').textContent = 'イベント編集';
  document.getElementById('f-name').value     = ev.EventName || '';
  document.getElementById('f-date').value     = (ev.Date||'').replace(' ','T');
  document.getElementById('f-location').value = ev.Location || '';
  document.getElementById('f-price').value    = ev.Price || 0;
  document.getElementById('f-capacity').value = ev.Capacity || 50;
  document.getElementById('f-paytype').value  = ev.PaymentType || 'FREE';
  document.getElementById('f-status').value   = ev.Status || 'OPEN';
  document.getElementById('modal-status-row').style.display = 'block';
  document.getElementById('modal-alert').innerHTML = '';
  document.getElementById('event-modal').classList.add('open');
}
function closeEventModal() { document.getElementById('event-modal').classList.remove('open'); }
document.getElementById('event-modal').addEventListener('click', e => { if (e.target === document.getElementById('event-modal')) closeEventModal(); });

async function saveEvent() {
  const nameEl = document.getElementById('f-name');
  const dateEl = document.getElementById('f-date');
  const locEl  = document.getElementById('f-location');
  const alertEl= document.getElementById('modal-alert');
  alertEl.innerHTML = '';
  if (!nameEl.value.trim() || !dateEl.value || !locEl.value.trim()) {
    alertEl.innerHTML = '<div class="alert alert-danger">イベント名・日時・会場は必須です。</div>'; return;
  }
  const btn = document.getElementById('modal-save-btn');
  btn.disabled = true; btn.textContent = '...';
  try {
    if (editingEventId) {
      await api('updateEvent', { event: { EventID:editingEventId, EventName:nameEl.value.trim(), Date:dateEl.value.replace('T',' '), Location:locEl.value.trim(), Price:Number(document.getElementById('f-price').value)||0, PaymentType:document.getElementById('f-paytype').value, Capacity:Number(document.getElementById('f-capacity').value)||50, Status:document.getElementById('f-status').value } });
      toastFn('success', 'イベントを更新しました');
    } else {
      await api('createEvent', { event: { eventName:nameEl.value.trim(), date:dateEl.value.replace('T',' '), location:locEl.value.trim(), price:Number(document.getElementById('f-price').value)||0, paymentType:document.getElementById('f-paytype').value, capacity:Number(document.getElementById('f-capacity').value)||50 } });
      toastFn('success', 'イベントを作成しました');
    }
    closeEventModal(); loadEvents(); loadDashboard();
  } catch(err) { alertEl.innerHTML = '<div class="alert alert-danger">'+esc(err.message)+'</div>'; }
  btn.disabled = false; btn.textContent = '保存';
}
async function toggleEventStatus(eventId, status) {
  try {
    await api('updateEvent', { event: { EventID:eventId, Status:status } });
    toastFn('success', status==='CLOSED'?'終了しました':'再開しました');
    loadEvents(); loadDashboard();
  } catch(err) { toastFn('danger', err.message); }
}

// ============================================================
// QR照会（ポーリング）
// ============================================================
let pollingTimer = null, lastScannedQr = null;

function startPolling() {
  stopPolling();
  document.getElementById('live-badge').style.display = 'inline-flex';
  pollingTimer = setInterval(pollLastScan, 2000);
  pollLastScan();
}
function stopPolling() {
  if (pollingTimer) { clearInterval(pollingTimer); pollingTimer = null; }
  document.getElementById('live-badge').style.display = 'none';
}
async function pollLastScan() {
  try {
    const data = await api('getLastScan');
    if (!data || !data.qr) return;
    const now = Date.now();
    if (data.qr === lastScannedQr && now - data.time < 10000) return;
    lastScannedQr = data.qr;
    await lookupQr(data.qr);
  } catch(e) {}
}

async function lookupQr(qrData) {
  if (!qrData) return;
  document.getElementById('waiting-box').style.display = 'none';
  document.getElementById('detail-panel').classList.remove('show');
  try {
    const data = await api('getRegistrationDetail', { qrData });
    showDetail(data);

    // ★ スキャンログを保存
    await api('saveScanLog', {
      eventId:         data.registration ? data.registration.EventID : '',
      participantId:   data.participant  ? data.participant.ParticipantID : '',
      participantName: data.participant  ? data.participant.Name : '不明',
      qrData,
      action: 'LOOKUP',
    });
    loadScanLogs();
  } catch(err) {
    document.getElementById('waiting-box').style.display = 'block';
    document.getElementById('waiting-box').innerHTML = '<p>'+esc(err.message)+'</p>';
  }
}

function showDetail(data) {
  const { registration:reg, participant, event:ev, qrData, history } = data;
  const panel = document.getElementById('detail-panel');
  panel.classList.add('show');

  const name = participant ? participant.Name : '不明';
  const rank = participant ? participant.Rank : '—';
  document.getElementById('detail-avatar').textContent = name.charAt(0);
  document.getElementById('detail-name').textContent   = name;
  document.getElementById('detail-rank').textContent   = rank + ' ランク';

  document.getElementById('detail-rows').innerHTML =
    '<div class="detail-row"><span class="detail-key">メール</span><span class="detail-val">'+esc(participant?participant.Email:'—')+'</span></div>' +
    '<div class="detail-row"><span class="detail-key">イベント</span><span class="detail-val">'+esc(ev?ev.EventName:reg.EventID)+'</span></div>' +
    '<div class="detail-row"><span class="detail-key">支払い</span><span class="detail-val" id="dp">'+payBadge(reg.PaymentStatus)+'</span></div>' +
    '<div class="detail-row"><span class="detail-key">入場</span><span class="detail-val" id="dc">'+checkinBadge(reg.CheckinStatus)+'</span></div>' +
    '<div class="detail-row"><span class="detail-key">参加回数</span><span class="detail-val">'+esc(participant?participant.TotalEvents:'—')+'</span></div>' +
    '<div class="detail-row"><span class="detail-key">照会時刻</span><span class="detail-val">'+new Date().toLocaleTimeString()+'</span></div>';

  // 参加履歴
  const histEl = document.getElementById('detail-history');
  if (history && history.length) {
    histEl.innerHTML = history.map(h =>
      '<div class="history-item-tl">'+
        '<div class="tl-dot"></div>'+
        '<div class="tl-body"><div class="tl-event">'+esc(h.eventName)+'</div><div class="tl-date">'+esc(h.date)+'</div></div>'+
      '</div>'
    ).join('');
  } else {
    histEl.innerHTML = '<p style="font-size:.78rem;color:var(--ai-soft);">参加履歴はありません</p>';
  }

  // アクション
  const actEl = document.getElementById('detail-actions');
  actEl.innerHTML = '';
  if (String(reg.CheckinStatus) !== 'TRUE') {
    const btn = document.createElement('button');
    btn.className = 'btn btn-matcha'; btn.textContent = 'チェックイン';
    btn.addEventListener('click', async () => {
      btn.disabled = true; btn.textContent = '...';
      try {
        const r = await api('checkin', { qrData });
        document.getElementById('dc').innerHTML = checkinBadge('TRUE');
        document.getElementById('detail-alert').innerHTML = '<div class="alert alert-success">'+esc(r.name)+' さんのチェックインが完了しました</div>';
        btn.textContent = 'チェックイン済み';
        // ログ更新
        await api('saveScanLog', { eventId:reg.EventID, participantId:reg.ParticipantID, participantName:participant?participant.Name:'', qrData, action:'CHECKIN' });
        loadScanLogs(); toastFn('success', r.name+' チェックイン完了');
      } catch(err) { btn.disabled=false; btn.textContent='チェックイン'; document.getElementById('detail-alert').innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>'; }
    });
    actEl.appendChild(btn);
  } else {
    const s = document.createElement('span');
    s.style = 'color:var(--matcha);font-weight:700;align-self:center;font-size:.875rem;';
    s.textContent = '入場済みです'; actEl.appendChild(s);
  }

  const sel = document.createElement('select');
  sel.className = 'form-control'; sel.style = 'max-width:200px;';
  sel.innerHTML = '<option value="">支払い変更…</option><option value="FREE">無料</option><option value="UNPAID">未払い</option><option value="PAYPAY_PENDING">PayPay確認待ち</option><option value="PAYPAY_PAID">PayPay支払済</option><option value="CASH">現金</option>';
  sel.addEventListener('change', async () => {
    if (!sel.value) return;
    try { await api('updatePaymentStatus', { registrationId:reg.RegistrationID, status:sel.value }); document.getElementById('dp').innerHTML = payBadge(sel.value); toastFn('success','支払い更新'); sel.value=''; }
    catch(err) { toastFn('danger', err.message); }
  });
  actEl.appendChild(sel);
  document.getElementById('detail-alert').innerHTML = '';
}

// ============================================================
// スキャンログ
// ============================================================
async function loadScanLogs() {
  const area = document.getElementById('scan-log-area');
  if (!area) return;
  try {
    const logs = await api('getScanLogs', {});
    if (!logs || !logs.length) { area.innerHTML = '<p style="font-size:.8rem;color:var(--ai-soft);padding:12px 0;">ログはまだありません</p>'; return; }
    let html = '<div class="table-wrap"><table><thead><tr><th>時刻</th><th>参加者名</th><th>イベントID</th><th>アクション</th></tr></thead><tbody>';
    logs.slice(0, 50).forEach(l => {
      html += '<tr>' +
        '<td style="font-size:.75rem;white-space:nowrap;">'+esc(l.ScannedAt)+'</td>' +
        '<td>'+esc(l.ParticipantName||'—')+'</td>' +
        '<td style="font-size:.72rem;color:var(--ai-soft);">'+esc(l.EventID||'—')+'</td>' +
        '<td>'+formatLogAction(l.Action)+'</td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
    area.innerHTML = html;
  } catch(e) { area.innerHTML = '<p style="color:var(--aki);font-size:.8rem;">ログ取得エラー</p>'; }
}

// ============================================================
// 登録一覧
// ============================================================
async function loadEventFilterOptions() {
  try {
    const events = await api('getEvents');
    const sel = document.getElementById('reg-event-filter');
    sel.innerHTML = '<option value="">全イベント</option>';
    events.forEach(ev => { const o=document.createElement('option'); o.value=ev.EventID; o.textContent=ev.EventName; sel.appendChild(o); });
  } catch(e) {}
}
async function loadRegistrations() {
  const area    = document.getElementById('registrations-area');
  const eventId = document.getElementById('reg-event-filter').value;
  area.innerHTML = '<div class="spinner"></div>';
  try {
    const regs = await api('getAllRegistrations', { eventId:eventId||undefined });
    if (!regs||!regs.length) { area.innerHTML='<div class="alert alert-info">データがありません。</div>'; return; }
    let html = '<div class="table-wrap"><table><thead><tr><th>参加者ID</th><th>イベントID</th><th>支払い</th><th>入場</th><th>登録日</th><th>変更</th></tr></thead><tbody>';
    regs.forEach(r => {
      html += '<tr>' +
        '<td style="font-size:.7rem;font-family:monospace;color:var(--ai-soft);">'+esc(r.ParticipantID)+'</td>' +
        '<td style="font-size:.7rem;color:var(--ai-soft);">'+esc(r.EventID)+'</td>' +
        '<td>'+payBadge(r.PaymentStatus)+'</td>' +
        '<td>'+checkinBadge(r.CheckinStatus)+'</td>' +
        '<td style="font-size:.75rem;">'+esc(r.Created?String(r.Created).slice(0,10):'')+'</td>' +
        '<td><select class="status-sel" onchange="updatePayment(\''+esc(r.RegistrationID)+'\',this.value)"><option value="">変更…</option><option value="FREE">無料</option><option value="UNPAID">未払い</option><option value="PAYPAY_PENDING">PayPay確認待ち</option><option value="PAYPAY_PAID">PayPay支払済</option><option value="CASH">現金</option></select></td>' +
        '</tr>';
    });
    html += '</tbody></table></div>';
    area.innerHTML = html;
  } catch(err) { area.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>'; }
}
async function updatePayment(registrationId, status) {
  if (!status) return;
  try { await api('updatePaymentStatus', {registrationId,status}); toastFn('success','支払い更新'); loadRegistrations(); }
  catch(err) { toastFn('danger', err.message); }
}

// ============================================================
// 参加者
// ============================================================
async function searchParticipants(query) {
  const area = document.getElementById('participants-area');
  const q    = query !== undefined ? query : (document.getElementById('search-input').value || '');
  area.innerHTML = '<div class="spinner"></div>';
  try {
    const list = await api('getParticipants', {query:q});
    if (!list||!list.length) { area.innerHTML='<div class="alert alert-info">参加者が見つかりません。</div>'; return; }
    let html = '<div class="table-wrap"><table><thead><tr><th>名前</th><th>メール</th><th>ランク</th><th>参加回数</th><th>登録日</th></tr></thead><tbody>';
    list.forEach(p => {
      html += '<tr><td><strong>'+esc(p.Name)+'</strong></td><td style="font-size:.8rem;">'+esc(p.Email)+'</td><td>'+esc(p.Rank)+'</td><td>'+esc(p.TotalEvents||0)+'</td><td style="font-size:.75rem;">'+esc(p.Created?String(p.Created).slice(0,10):'')+'</td></tr>';
    });
    html += '</tbody></table></div>';
    area.innerHTML = html;
  } catch(err) { area.innerHTML='<div class="alert alert-danger">'+esc(err.message)+'</div>'; }
}
document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') searchParticipants(); });
document.getElementById('manual-qr-input').addEventListener('keydown', e => { if(e.key==='Enter') lookupQr(document.getElementById('manual-qr-input').value.trim()); });

// ============================================================
// 満足度調査
// ============================================================
async function loadSurveyEventOptions() {
  try {
    const events = await api('getEvents');
    const stats  = await api('getStats');
    const allEvs = stats.eventStats || [];

    [document.getElementById('survey-event-sel'), document.getElementById('survey-view-event')].forEach(sel => {
      if (!sel) return;
      const cur = sel.value;
      sel.innerHTML = sel.id === 'survey-view-event' ? '<option value="">全イベント</option>' : '<option value="">イベントを選択</option>';
      allEvs.forEach(ev => { const o=document.createElement('option'); o.value=ev.EventID; o.textContent=ev.EventName; sel.appendChild(o); });
      sel.value = cur;
    });
  } catch(e) {}
}

async function sendSurvey(withEmail) {
  const eventId = document.getElementById('survey-event-sel').value;
  const alertEl = document.getElementById('survey-send-alert');
  alertEl.innerHTML = '';
  if (!eventId) { alertEl.innerHTML = '<div class="alert alert-danger">イベントを選択してください</div>'; return; }
  try {
    const result = await api('sendSurvey', { eventId, sendEmail: withEmail });
    alertEl.innerHTML = '<div class="alert alert-success">'+result.sent+'件送信しました（対象: '+result.total+'件）</div>';
    toastFn('success', '満足度調査を送信しました');
  } catch(err) { alertEl.innerHTML = '<div class="alert alert-danger">'+esc(err.message)+'</div>'; }
}

async function loadSurveyStats() {
  const area    = document.getElementById('survey-stats-area');
  const eventId = document.getElementById('survey-view-event').value;
  area.innerHTML = '<div class="spinner"></div>';
  try {
    const [stats, surveys] = await Promise.all([
      api('getSurveyStats', { eventId: eventId||undefined }),
      api('getSurveys',     { eventId: eventId||undefined }),
    ]);

    if (stats.count === 0) {
      area.innerHTML = '<div class="alert alert-info">まだ回答がありません。</div>';
      return;
    }

    let html =
      '<div class="survey-grid">' +
        // 左：全体集計
        '<div class="survey-card">' +
          '<h4>全体集計</h4>' +
          '<div class="avg-display">' +
            '<div class="avg-num">'+stats.avg+'</div>' +
            '<div class="avg-stars">'+starStr(stats.avg)+'</div>' +
            '<div class="avg-label">平均満足度（'+stats.count+'件）</div>' +
          '</div>' +
          '<div class="chart-wrap" style="height:160px;"><canvas id="chart-dist-survey"></canvas></div>' +
        '</div>' +
        // 右：個人回答一覧
        '<div class="survey-card">' +
          '<h4>個人別回答</h4>' +
          '<div class="comment-list">';

    surveys.forEach(s => {
      html +=
        '<div class="comment-item">' +
          '<div style="display:flex;justify-content:space-between;">' +
            '<span class="comment-name">'+esc(s.ParticipantName)+'</span>' +
            '<span class="comment-rating">'+starStr(s.Rating)+' '+s.Rating+'</span>' +
          '</div>' +
          (s.Comment ? '<div class="comment-text">'+esc(s.Comment)+'</div>' : '') +
          '<div style="font-size:.7rem;color:var(--ai-soft);">'+esc(s.AnsweredAt)+'</div>' +
        '</div>';
    });

    html += '</div></div></div>';
    area.innerHTML = html;

    // 分布グラフ
    const ctx = document.getElementById('chart-dist-survey');
    if (ctx) {
      if (chartInstances['dist-survey']) chartInstances['dist-survey'].destroy();
      chartInstances['dist-survey'] = new Chart(ctx, {
        type: 'bar',
        data: {
          labels: ['★1','★2','★3','★4','★5'],
          datasets: [{ label:'回答数', data:stats.distribution, backgroundColor:['#f4b8cb','#7b5ea7','#d4511a','#b8d4f0','#1a2744'], borderRadius:6 }]
        },
        options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{ display:false } }, scales:{ y:{ beginAtZero:true, ticks:{ stepSize:1 } } } }
      });
    }

  } catch(err) { area.innerHTML = '<div class="alert alert-danger">'+esc(err.message)+'</div>'; }
}

// lang-sel（シンプルに言語保存のみ）
let lang = localStorage.getItem('lang') || 'ja';
function setLang(l) { lang = l; localStorage.setItem('lang', l); }
document.getElementById('lang-sel').value = lang;
</script>
